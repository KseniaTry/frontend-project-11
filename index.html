<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rss</title>
</head>

<body>
  <div id="app">
    <div class="container-fluid p-5 bg-dark text-white">
      <h1>RSS агрегатор</h1>
      <p>Начните читать RSS сегодня. Это легко, это красиво</p>
      <form class="form-floating mb-3 d-flex flex-wrap gap-3" data-name="form" type="post">
        <input class="form-control w-75" type="text" id="link" name="link" value="" data-name="link-input"
          placeholder="Ссылка RSS" aria-describedby="feedback">
        <label class="form-label" for="link">Ссылка RSS</label>
        <button type="submit" data-name="add-button" class="btn btn-secondary">Добавить</button>
        <div class="form-text text-secondary">Пример:
          <a class="text-secondary" href="https://lorem-rss.hexlet.app/feed">https://lorem-rss.hexlet.app/feed</a>
        </div>
        <div id="feedback" class="invalid-feedback order-last"></div>
      </form>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
