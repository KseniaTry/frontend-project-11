<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rss</title>
</head>

<body>
  <div id="app">
    <div class="container-fluid p-5 bg-dark text-white">
      <h1 data-name="title"></h1>
      <p data-name="description"></p>
      <form class="form-floating d-flex flex-wrap gap-3" data-name="form" type="post">
        <input class="form-control w-75" aria-label="url" type="text" id="link" name="link" value=""
          data-name="add-link-input">
        <label class="form-label" for="link" data-name="add-link-label"></label>
        <button type="submit" data-name="add-button" class="btn btn-secondary"></button>
        <div>
          <div class="form-text text-secondary mb-3">
            <span data-name="example-text"></span>
            <a class="text-secondary" data-name="example-link" href="https://lorem-rss.hexlet.app/feed"></a>
          </div>
          <p id="feedback" style="min-height: 1.5rem" class="order-last mb-0 feedback"></p>
        </div>
      </form>
    </div>
    <!-- посты и фиды -->
    <div class="container-fluid p-5" data-name="rss-container">
      <div class="row g-5">
        <div class="col-md-8 posts" data-name="posts-container"> </div>
        <div class="col-md-4 feeds" data-name="feeds-container"> </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Modal title</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <!-- Контент модального окна -->
        </div>
        <div class="modal-footer">
          <a class="btn btn-primary" data-name="read" role="button" href="#">Читать полностью</a>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
        </div>
      </div>
    </div>
  </div>


  <script type="module" src="/src/main.js"></script>
</body>

</html>
